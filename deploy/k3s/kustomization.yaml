apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iot-gateway

resources:
  # Namespace
  - namespace.yaml

  # Secrets and ConfigMaps
  - configmaps/common-config.yaml
  - secrets/db-credentials.yaml

  # Infrastructure
  - infrastructure/redis/pvc.yaml
  - infrastructure/redis/deployment.yaml
  - infrastructure/redis/service.yaml
  - infrastructure/postgres/statefulset.yaml
  - infrastructure/postgres/service.yaml
  - infrastructure/mosquitto/deployment.yaml
  - infrastructure/mosquitto/service.yaml

  # Services
  - services/data-ingestion/deployment.yaml
  - services/data-ingestion/service.yaml
  - services/data-ingestion/hpa.yaml
  - services/data-persistence/deployment.yaml
  - services/data-persistence/service.yaml

commonLabels:
  app.kubernetes.io/part-of: iot-edge-gateway
