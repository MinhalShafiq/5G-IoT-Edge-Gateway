apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-ingestion
  namespace: iot-gateway
  labels:
    app: data-ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-ingestion
  template:
    metadata:
      labels:
        app: data-ingestion
    spec:
      containers:
        - name: data-ingestion
          image: iot-gateway/data-ingestion:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: db-credentials
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
