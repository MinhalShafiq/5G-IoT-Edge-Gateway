apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-persistence
  namespace: iot-gateway
  labels:
    app: data-persistence
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-persistence
  template:
    metadata:
      labels:
        app: data-persistence
    spec:
      containers:
        - name: data-persistence
          image: iot-gateway/data-persistence:latest
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: db-credentials
          env:
            - name: BATCH_SIZE
              value: "100"
            - name: FLUSH_INTERVAL_SECONDS
              value: "5.0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
