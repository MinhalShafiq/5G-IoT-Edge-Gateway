apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: iot-gateway
  labels:
    app: mosquitto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: iot-gateway/mqtt-broker:latest
          ports:
            - containerPort: 1883
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - name: mosquitto-data
              mountPath: /mosquitto/data
      volumes:
        - name: mosquitto-data
          emptyDir: {}
