apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: iot-gateway
type: Opaque
stringData:
  POSTGRES_USER: iot_gateway
  POSTGRES_PASSWORD: changeme
  POSTGRES_DSN: "postgresql+asyncpg://iot_gateway:changeme@postgres:5432/iot_gateway"
  JWT_SECRET: "change-this-to-a-secure-random-string"
