# =============================================================================
# Mosquitto Access Control List (ACL)
# 5G IoT Edge Gateway Project
#
# Syntax reference:
#   user <username>        — matches authenticated clients by username
#   pattern <topic>        — matches any client; supports %c (client-id)
#                            and %u (username) substitutions
#   topic read  <filter>   — allow subscribe / receive
#   topic write <filter>   — allow publish
#   topic readwrite <filter> — allow both
#
# When allow_anonymous is true and no username is provided, the client is
# matched against the anonymous-user rules at the top of this file and any
# "pattern" rules that follow.
# =============================================================================

# -----------------------------------------------------------------------------
# Anonymous / Device clients
# -----------------------------------------------------------------------------
# Devices publish telemetry data and status updates.
# The '+' wildcard represents the individual device identifier.
topic write devices/+/telemetry
topic write devices/+/status

# -----------------------------------------------------------------------------
# Gateway services
# -----------------------------------------------------------------------------
# Internal gateway services (ingestion, rules engine, etc.) subscribe to the
# full device topic tree to consume telemetry and status messages.
user gateway
topic read devices/#

# -----------------------------------------------------------------------------
# Admin
# -----------------------------------------------------------------------------
# The admin user has unrestricted read/write access to every topic.
user admin
topic readwrite #
