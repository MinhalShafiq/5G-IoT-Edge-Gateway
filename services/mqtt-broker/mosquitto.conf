# =============================================================================
# Mosquitto MQTT Broker Configuration
# 5G IoT Edge Gateway Project
#
# Environment: Development
# Security Note: Anonymous access is enabled for development. Authentication
#                and TLS will be enforced in Increment 8.
# =============================================================================

# -----------------------------------------------------------------------------
# Listener
# -----------------------------------------------------------------------------
# Plain TCP listener on port 1883 (no TLS for development).
listener 1883
protocol mqtt

# -----------------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------------
# Allow anonymous connections during development. This MUST be set to false
# and replaced with proper authentication (password_file or auth_plugin)
# before any production deployment (see Increment 8).
allow_anonymous true

# ACL file for topic-level access control.
acl_file /mosquitto/config/acl.conf

# -----------------------------------------------------------------------------
# Persistence
# -----------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
# Log to stdout so Docker can capture output via its logging driver.
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# -----------------------------------------------------------------------------
# Limits
# -----------------------------------------------------------------------------
# Maximum MQTT message payload size: 1 MB (1048576 bytes).
message_size_limit 1048576

# Maximum number of concurrent client connections.
max_connections 10000

# -----------------------------------------------------------------------------
# Keep-alive
# -----------------------------------------------------------------------------
# Maximum keep-alive interval in seconds. Clients requesting a higher value
# will be capped to this.
max_keepalive 60
