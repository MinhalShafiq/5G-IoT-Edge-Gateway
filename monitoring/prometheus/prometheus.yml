global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "data-ingestion"
    static_configs:
      - targets: ["data-ingestion:8001"]
    metrics_path: /metrics

  - job_name: "ml-inference"
    static_configs:
      - targets: ["ml-inference:8004"]
    metrics_path: /metrics
